<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>极简周计划</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<!-- ── Sidebar ── -->
<nav id="sidebar">
  <div class="sidebar-top">
    <button class="sidebar-item active" data-view="week" title="周视图">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="3" width="12" height="11" rx="1.5"/>
        <path d="M5 3V1.5M11 3V1.5M2 7h12"/>
      </svg>
    </button>
    <button class="sidebar-item" data-view="all" title="所有任务">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <line x1="5.5" y1="4" x2="13" y2="4"/>
        <line x1="5.5" y1="8" x2="13" y2="8"/>
        <line x1="5.5" y1="12" x2="13" y2="12"/>
        <circle cx="2.5" cy="4" r="1" fill="currentColor" stroke="none"/>
        <circle cx="2.5" cy="8" r="1" fill="currentColor" stroke="none"/>
        <circle cx="2.5" cy="12" r="1" fill="currentColor" stroke="none"/>
      </svg>
    </button>
  </div>
  <div class="sidebar-bottom">
    <button class="sidebar-item sidebar-item--disabled" title="设置（即将推出）">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="8" cy="8" r="2.5"/>
        <path d="M8 1.5V3M8 13v1.5M1.5 8H3M13 8h1.5M3.4 3.4l1.1 1.1M11.5 11.5l1.1 1.1M3.4 12.6l1.1-1.1M11.5 4.5l1.1-1.1"/>
      </svg>
    </button>
  </div>
</nav>

<div id="app">

  <!-- ── Week view ── -->
  <header id="week-header">
    <button id="btn-prev" class="nav-btn" title="上一周">‹</button>
    <h1 id="week-label"></h1>
    <button id="btn-today" class="nav-btn today-btn">今日</button>
    <button id="btn-next" class="nav-btn" title="下一周">›</button>
  </header>
  <main id="week-grid"></main>

  <!-- ── All-tasks view ── -->
  <div id="all-tasks-view" hidden>

    <!-- toolbar -->
    <div id="all-toolbar">
      <div id="all-filters">
        <!-- Status chips -->
        <div class="filter-group">
          <button class="filter-chip active" data-filter="status" data-value="">全部</button>
          <button class="filter-chip" data-filter="status" data-value="todo">待办</button>
          <button class="filter-chip" data-filter="status" data-value="done">已完成</button>
        </div>
        <div class="filter-sep"></div>
        <!-- Priority chips -->
        <div class="filter-group">
          <button class="filter-chip active" data-filter="priority" data-value="">全部</button>
          <button class="filter-chip" data-filter="priority" data-value="urgent">
            <span class="fchip-dot" style="background:#E8524A"></span>紧急
          </button>
          <button class="filter-chip" data-filter="priority" data-value="important">
            <span class="fchip-dot" style="background:#F5A623"></span>重要
          </button>
          <button class="filter-chip" data-filter="priority" data-value="normal">普通</button>
        </div>
        <div class="filter-sep"></div>
        <!-- Date range chips -->
        <div class="filter-group">
          <button class="filter-chip active" data-filter="date" data-value="">全部日期</button>
          <button class="filter-chip" data-filter="date" data-value="today">今天</button>
          <button class="filter-chip" data-filter="date" data-value="week">本周</button>
          <button class="filter-chip" data-filter="date" data-value="month">本月</button>
        </div>
      </div>

      <div id="all-toolbar-right">
        <!-- Search -->
        <div id="all-search-wrap">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="6.5" cy="6.5" r="4"/>
            <line x1="9.5" y1="9.5" x2="13.5" y2="13.5"/>
          </svg>
          <input id="all-search" type="text" placeholder="搜索任务…" autocomplete="off" />
        </div>
        <!-- Sort -->
        <select id="all-sort">
          <option value="date_asc">日期 ↑ 最近</option>
          <option value="date_desc">日期 ↓ 最远</option>
          <option value="priority">优先级</option>
        </select>
        <!-- New task -->
        <button id="all-btn-new">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <line x1="8" y1="3" x2="8" y2="13"/><line x1="3" y1="8" x2="13" y2="8"/>
          </svg>
          新增任务
        </button>
      </div>
    </div>

    <!-- task list -->
    <div id="all-tasks-list"></div>

    <!-- new task quick-add panel -->
    <div id="all-quick-add" class="hidden">
      <input id="all-qa-title" type="text" placeholder="任务名称…" autocomplete="off" />
      <input id="all-qa-date"  type="date" />
      <select id="all-qa-priority">
        <option value="normal">普通</option>
        <option value="important">重要</option>
        <option value="urgent">紧急</option>
      </select>
      <button id="all-qa-submit">添加</button>
      <button id="all-qa-cancel">取消</button>
    </div>

  </div>

</div><!-- #app -->

<!-- ── Edit modal ── -->
<div id="modal-backdrop"></div>
<div id="modal" role="dialog" aria-modal="true">

  <div id="modal-top">
    <div id="modal-date-label"></div>
    <div id="modal-toolbar">
      <button class="modal-tool-btn" id="modal-btn-reminder" title="设置提醒">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M8 2a5 5 0 0 1 5 5v2l1 2H2l1-2V7a5 5 0 0 1 5-5z"/>
          <path d="M6.5 13.5a1.5 1.5 0 0 0 3 0"/>
        </svg>
      </button>
      <button class="modal-tool-btn" id="modal-btn-color" title="颜色标签">
        <svg viewBox="0 0 16 16" fill="currentColor">
          <circle cx="8" cy="8" r="4.5"/>
        </svg>
      </button>
      <button class="modal-tool-btn" id="modal-btn-recurring" title="循环设置">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M2 8a6 6 0 0 1 6-6 6 6 0 0 1 4.2 1.8"/>
          <path d="M14 8a6 6 0 0 1-6 6 6 6 0 0 1-4.2-1.8"/>
          <path d="M11 3.5l1.5-1.5 1.5 1.5M5 12.5l-1.5 1.5-1.5-1.5"/>
        </svg>
      </button>
      <button class="modal-tool-btn modal-tool-btn--delete" id="modal-btn-delete" title="删除任务">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M3 4h10M6 4V2h4v2M5 4l.5 9h5L11 4"/>
        </svg>
      </button>
      <button class="modal-tool-btn modal-tool-btn--close" id="modal-btn-close" title="关闭">✕</button>
    </div>
  </div>

  <!-- Sub-pickers -->
  <div id="modal-color-picker" class="modal-sub-panel hidden">
    <span class="color-swatch selected" data-color=""     style="background:#E8E8E4" title="无颜色">✕</span>
    <span class="color-swatch" data-color="blue"   style="background:#4A90D9" title="蓝色"></span>
    <span class="color-swatch" data-color="green"  style="background:#52B788" title="绿色"></span>
    <span class="color-swatch" data-color="red"    style="background:#E8524A" title="红色"></span>
    <span class="color-swatch" data-color="yellow" style="background:#F5A623" title="黄色"></span>
    <span class="color-swatch" data-color="purple" style="background:#9B59B6" title="紫色"></span>
  </div>

  <div id="modal-recurring-picker" class="modal-sub-panel hidden">
    <button class="recur-btn active" data-value="">不循环</button>
    <button class="recur-btn" data-value="daily">每天</button>
    <button class="recur-btn" data-value="weekly">每周</button>
    <button class="recur-btn" data-value="monthly">每月</button>
  </div>

  <div id="modal-reminder-picker" class="modal-sub-panel hidden">
    <input type="datetime-local" id="modal-reminder-input" />
    <button id="modal-reminder-clear">清除</button>
  </div>

  <!-- Priority picker -->
  <div id="modal-priority-row" class="modal-sub-panel">
    <button class="priority-btn active" data-priority="normal">普通</button>
    <button class="priority-btn" data-priority="important">
      <span class="priority-dot" style="background:#F5A623"></span>重要
    </button>
    <button class="priority-btn" data-priority="urgent">
      <span class="priority-dot" style="background:#E8524A"></span>紧急
    </button>
  </div>

  <!-- Main body -->
  <div id="modal-body">
    <input id="modal-title-input" type="text" placeholder="任务名称…"
           autocomplete="off" spellcheck="false" />
    <textarea id="modal-notes-input" placeholder="添加备注…"
              rows="3" spellcheck="false"></textarea>

    <div id="modal-subtasks-section">
      <div id="modal-subtask-list"></div>
      <div id="modal-add-subtask-row">
        <input id="modal-subtask-input" type="text"
               placeholder="＋ 添加子任务…" autocomplete="off" />
      </div>
    </div>
  </div>

</div><!-- #modal -->

<!-- ── Right-click context menu (priority quick-set) ── -->
<div id="context-menu">
  <button class="ctx-item" data-priority="normal">普通</button>
  <button class="ctx-item" data-priority="important">
    <span class="ctx-dot" style="background:#F5A623"></span>重要
  </button>
  <button class="ctx-item" data-priority="urgent">
    <span class="ctx-dot" style="background:#E8524A"></span>紧急
  </button>
</div>

<!-- ── Recurring scope dialog ── -->
<div id="recur-scope-backdrop"></div>
<div id="recur-scope-dialog" role="dialog" aria-modal="true">
  <p id="recur-scope-msg"></p>
  <div id="recur-scope-btns">
    <button id="recur-scope-single">仅此任务</button>
    <button id="recur-scope-future">此任务及之后所有任务</button>
    <button id="recur-scope-cancel">取消</button>
  </div>
</div>

<!-- ── SSE Reminder cards container ── -->
<div id="reminder-container"></div>

<!-- ── Toast container ── -->
<div id="toast-container" aria-live="polite"></div>

<script src="/static/app.js"></script>
</body>
</html>
